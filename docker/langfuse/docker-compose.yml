services:
  postgres:
    image: postgres:16-alpine
    container_name: ares_langfuse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2          # v2 — Postgres only, no ClickHouse needed
    container_name: ares_langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ares-langfuse-secret-change-in-prod
      SALT: ares-langfuse-salt-change-in-prod
      TELEMETRY_ENABLED: "false"        # no external telemetry — 100% local
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      NEXT_PUBLIC_SIGN_UP_DISABLED: "false"

volumes:
  langfuse_db:
